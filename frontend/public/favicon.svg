<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#121026" />
      <stop offset="100%" stop-color="#0a0914" />
    </linearGradient>

    <linearGradient id="gemGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="50%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>

    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background container -->
  <rect width="512" height="512" rx="128" fill="url(#bgGlow)" />
  <rect width="504" height="504" x="4" y="4" rx="124" fill="none" stroke="url(#gemGradient)" stroke-width="8" stroke-opacity="0.3" />

  <!-- Outer Glowing Diamond Gem -->
  <g filter="url(#neonGlow)">
    <!-- Main Gem Hexagon/Diamond -->
    <path d="M 256,64 L 416,160 L 416,352 L 256,448 L 96,352 L 96,160 Z" fill="url(#gemGradient)" opacity="0.95" />

    <!-- Facet Facets & Geometric Insets -->
    <path d="M 256,64 L 256,256 L 416,160 Z" fill="#ffffff" opacity="0.25" />
    <path d="M 416,160 L 256,256 L 416,352 Z" fill="#000000" opacity="0.15" />
    <path d="M 416,352 L 256,256 L 256,448 Z" fill="#000000" opacity="0.3" />
    <path d="M 256,448 L 256,256 L 96,352 Z" fill="#ffffff" opacity="0.1" />
    <path d="M 96,352 L 256,256 L 96,160 Z" fill="#ffffff" opacity="0.35" />

    <!-- Center Mint Spark Bolt -->
    <path d="M 276,140 L 216,250 L 266,250 L 236,370 L 316,230 L 266,230 Z" fill="#ffffff" filter="drop-shadow(0px 0px 8px rgba(255,255,255,0.8))" />
  </g>
</svg>
